services:
  - type: web
    name: leaderassess-api
    runtime: node
    region: oregon
    plan: starter
    branch: main
    rootDir: .
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/app.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: leaderassess-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: leaderassess-redis
          type: redis
          property: connectionString
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: BCRYPT_ROUNDS
        value: 12
      - key: CORS_ORIGINS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: noreply@leaderassess.com
      - key: JUDGE0_API_URL
        sync: false
      - key: JUDGE0_API_KEY
        sync: false
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 200

databases:
  - name: leaderassess-postgres
    databaseName: leaderassess
    plan: starter
    region: oregon

  - name: leaderassess-redis
    type: redis
    plan: starter
    region: oregon
    ipAllowList: []
