# Railway config — API service.
# In Railway dashboard: create two services from this repo.
#   Service "api":  Root Dir = /,  Dockerfile = infra/docker/Dockerfile.api
#   Service "web":  Root Dir = /,  Dockerfile = infra/docker/Dockerfile.web
# Each service gets its own env vars (see below).

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Required env vars for the API service — set in Railway dashboard:
#
#   DATABASE_URL          postgresql://... (Railway Postgres plugin auto-sets this)
#   REDIS_URL             redis://...      (Railway Redis plugin auto-sets this)
#   FIREBASE_PROJECT_ID   your-firebase-project
#   FIREBASE_CLIENT_EMAIL firebase-adminsdk-xxx@your-project.iam.gserviceaccount.com
#   FIREBASE_PRIVATE_KEY  -----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----\n
#   JWT_SECRET            min 32 random chars  (openssl rand -hex 32)
#   CORS_ORIGIN           https://your-web-service.railway.app  (or custom domain)
#   NODE_ENV              production
#
# Optional (disable features when not set):
#   STRIPE_SECRET_KEY
#   STRIPE_WEBHOOK_SECRET
#   STRIPE_PRICE_FREE / STRIPE_PRICE_PRO / STRIPE_PRICE_ENTERPRISE
#   ANTHROPIC_API_KEY     required for AI report generation (reports fail otherwise)
#   REPORT_MODEL          Claude model for reports (default claude-sonnet-4-6)
#   JUDGE0_URL            required for real code execution (e.g. https://judge0-ce.p.rapidapi.com)
#   JUDGE0_API_KEY        RapidAPI key for Judge0 (omit for self-hosted)
#   JUDGE0_API_HOST       RapidAPI host header (default judge0-ce.p.rapidapi.com)
