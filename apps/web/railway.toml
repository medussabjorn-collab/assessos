[build]
builder = "DOCKERFILE"
dockerfilePath = "infra/docker/Dockerfile.web"

[deploy]
# Explicit start command — overrides any stale "pnpm start" set in the
# dashboard from an earlier Nixpacks build (config-as-code wins). HOSTNAME
# and PORT forced inline and unconditional (no ${PORT:-3001} fallback):
# Railway injects its own PORT (observed 8080) and HOSTNAME (container id)
# env vars, which a fallback expression would honor over our default,
# binding the app to a port that doesn't match the fixed Target Port (3001)
# on the public domain, or crashing on bind. See Dockerfile.web CMD comment.
startCommand = "sh -c 'HOSTNAME=0.0.0.0 PORT=3001 node apps/web/server.js'"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Required env vars for the web service — set in Railway dashboard:
#
#   NEXT_PUBLIC_FIREBASE_API_KEY        your-firebase-api-key
#   NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN    your-project.firebaseapp.com
#   NEXT_PUBLIC_FIREBASE_PROJECT_ID     your-project-id
#   NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET your-project.appspot.com
#   NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID  ...
#   NEXT_PUBLIC_FIREBASE_APP_ID         ...
#   NEXT_PUBLIC_API_URL                 https://your-api-service.railway.app
#   NODE_ENV                            production
