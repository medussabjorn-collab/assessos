[build]
builder = "DOCKERFILE"
dockerfilePath = "infra/docker/Dockerfile.web"

[deploy]
# Explicit start command — overrides any stale "pnpm start" set in the
# dashboard from an earlier Nixpacks build (config-as-code wins).
# Shell-level `PORT=3001 node server.js` was NOT sufficient — Railway
# confirmed the running process still saw PORT=8080 despite that (its
# platform env injection wins over shell-prefixed assignments on this
# builder). start.js forces process.env at the JS runtime level instead,
# which cannot be overridden by anything upstream. See Dockerfile.web.
startCommand = "node start.js"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Required env vars for the web service — set in Railway dashboard:
#
#   NEXT_PUBLIC_FIREBASE_API_KEY        your-firebase-api-key
#   NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN    your-project.firebaseapp.com
#   NEXT_PUBLIC_FIREBASE_PROJECT_ID     your-project-id
#   NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET your-project.appspot.com
#   NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID  ...
#   NEXT_PUBLIC_FIREBASE_APP_ID         ...
#   NEXT_PUBLIC_API_URL                 https://your-api-service.railway.app
#   NODE_ENV                            production
