# ─── LeaderAssess Pro — Full Local Stack ──────────────────────────────────────
# Usage:
#   docker compose up -d          # start all services
#   docker compose up -d api      # start only backend + its deps
#   docker compose logs -f api    # stream backend logs
#   docker compose down -v        # stop + remove volumes

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     leaderassess
      POSTGRES_PASSWORD: leaderassess_dev
      POSTGRES_DB:       leaderassess
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leaderassess"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB ───────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: leaderassess
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Mailhog (local email catcher) ─────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI  →  http://localhost:8025

  # ── Backend API ───────────────────────────────────────────────────────────
  api:
    build:
      context: ./leadership-assessment-backend
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      mongo:    { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      NODE_ENV:               development
      PORT:                   4000
      DATABASE_URL:           postgresql://leaderassess:leaderassess_dev@postgres:5432/leaderassess
      MONGODB_URI:            mongodb://mongo:27017/leaderassess
      REDIS_HOST:             redis
      REDIS_PORT:             6379
      JWT_SECRET:             dev-jwt-secret-must-be-32-chars-min
      JWT_REFRESH_SECRET:     dev-refresh-secret-32-chars-min-xx
      JWT_EXPIRES_IN:         15m
      JWT_REFRESH_EXPIRES_IN: 30d
      BCRYPT_ROUNDS:          10
      CORS_ORIGINS:           http://localhost:5173
      APP_URL:                http://localhost:5173
      SMTP_HOST:              mailhog
      SMTP_PORT:              1025
      EMAIL_FROM:             noreply@leaderassess.local
      RATE_LIMIT_WINDOW_MS:   900000
      RATE_LIMIT_MAX:         1000
    ports:
      - "4000:4000"
    volumes:
      # Mount source for hot-reload in dev (override CMD to npm run dev)
      - ./leadership-assessment-backend/src:/app/src:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # ── Frontend (Vite dev server) ────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:4000/api/v1
    volumes:
      - ./leadership-assessment:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
  mongo_data:
  redis_data:
